<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Вход в систему</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <h1>Добро пожаловать в LMS</h1>
        
        <div class="form-group">
            <label for="name">Имя</label>
            <input type="text" id="name" placeholder="Введите ваше имя">
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>
        
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Минимум 6 символов">
        </div>
        
        <div class="form-group">
            <label for="role">Роль</label>
            <select id="role">
                <option value="STUDENT">Студент</option>
                <option value="ADMIN">Администратор</option>
            </select>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" id="loginBtn">Войти</button>
            <button class="btn btn-success" id="registerBtn">Зарегистрироваться</button>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
